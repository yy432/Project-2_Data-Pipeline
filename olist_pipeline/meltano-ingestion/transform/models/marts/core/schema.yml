version: 2

models:
  - name: dim_customers
    columns:
      - name: customer_key
        tests: [not_null, unique]

  - name: dim_sellers
    columns:
      - name: seller_key
        tests: [not_null, unique]

  - name: dim_products
    columns:
      - name: product_key
        tests: [not_null, unique]

  - name: fct_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_key
        tests: [not_null]
      - name: order_gross_total
        tests: [not_null]

  - name: fct_order_items
    columns:
      - name: order_id
        tests: [not_null]
      - name: product_key
        tests: [not_null]
      - name: seller_key
        tests: [not_null]
