version: 2

models:

  - name: stg_customers
    description: Cleaned customers. One row per order session; customer_unique_id is the true unique person.
    columns:
      - name: customer_id
        tests: [not_null, unique]
      - name: customer_unique_id
        tests: [not_null]
      - name: zip_code_prefix
        tests: [not_null]
      - name: customer_city
      - name: customer_state
        tests: [not_null]

  - name: stg_orders
    description: Cleaned orders with parsed timestamps and derived delivery metrics.
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_status
        tests:
          - not_null
          - accepted_values:
              values: ["delivered","shipped","canceled","unavailable",
                       "invoiced","processing","created","approved"]

  - name: stg_order_items
    description: Line items with price and freight; composite key order_id + order_item_id.
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_item_id
        tests: [not_null]
      - name: product_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: seller_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_sellers')
              field: seller_id
      - name: item_price
        tests: [not_null]
      - name: freight_value
        tests: [not_null]

  - name: stg_order_payments
    description: Payment rows; multiple rows per order for installment / split payments.
    columns:
      - name: order_id
        tests: [not_null]
      - name: payment_type
        tests:
          - accepted_values:
              values: ["credit_card","boleto","voucher","debit_card","not_defined"]

  - name: stg_order_reviews
    description: Customer reviews with sentiment bucketing.
    columns:
      - name: review_id
        tests: [not_null, unique]
      - name: order_id
        tests: [not_null]
      - name: review_score
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: sentiment
        tests:
          - accepted_values:
              values: ["positive","neutral","negative"]

  - name: stg_products
    description: Products joined with English category translations.
    columns:
      - name: product_id
        tests: [not_null, unique]
      - name: product_category
        tests: [not_null]

  - name: stg_sellers
    description: Seller master data, normalised city/state.
    columns:
      - name: seller_id
        tests: [not_null, unique]

  - name: stg_geolocation
    description: Deduplicated ZIP→lat/lng lookup (avg lat/lng, most frequent city/state).
    columns:
      - name: zip_code_prefix
        tests: [not_null, unique]
