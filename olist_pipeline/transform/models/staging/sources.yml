version: 2

sources:
  - name: olist_raw
    description: >
      Raw Olist Brazilian e-commerce data landed by Meltano (tap-csv → target-bigquery).
      Each table mirrors the corresponding CSV file with added _sdc metadata columns.
    database: "{{ env_var('BIGQUERY_PROJECT_ID') }}"
    schema: "{{ var('raw_schema', 'olist_raw_dev') }}"
    tags: ["raw", "olist"]

    # ── Freshness checks ──────────────────────────────────────────────
    freshness:
      warn_after: {count: 25, period: hour}
      error_after: {count: 49, period: hour}
    loaded_at_field: _sdc_received_at

    tables:

      - name: customers
        description: One row per customer order session (not unique customer).
        columns:
          - name: customer_id
            description: Key linking orders → customers (session-level).
            tests: [not_null, unique]
          - name: customer_unique_id
            description: True unique customer identifier.
            tests: [not_null]
          - name: customer_zip_code_prefix
            tests: [not_null]
          - name: customer_city
          - name: customer_state
            tests: [not_null]

      - name: geolocation
        description: ZIP code → lat/lng/city/state mapping. May contain duplicate ZIPs.
        columns:
          - name: geolocation_zip_code_prefix
            tests: [not_null]
          - name: geolocation_lat
            tests: [not_null]
          - name: geolocation_lng
            tests: [not_null]
          - name: geolocation_city
          - name: geolocation_state

      - name: orders
        description: One row per order. Core fact anchor.
        columns:
          - name: order_id
            tests: [not_null, unique]
          - name: customer_id
            tests: [not_null]
          - name: order_status
            tests:
              - not_null
              - accepted_values:
                  values: ["delivered", "shipped", "canceled", "unavailable",
                           "invoiced", "processing", "created", "approved"]
          - name: order_purchase_timestamp
            tests: [not_null]
          - name: order_approved_at
          - name: order_delivered_carrier_date
          - name: order_delivered_customer_date
          - name: order_estimated_delivery_date

      - name: order_items
        description: Line items within an order (product + seller + price).
        columns:
          - name: order_id
            tests: [not_null]
          - name: order_item_id
            tests: [not_null]
          - name: product_id
            tests: [not_null]
          - name: seller_id
            tests: [not_null]
          - name: shipping_limit_date
          - name: price
            tests: [not_null]
          - name: freight_value
            tests: [not_null]

      - name: order_payments
        description: Payment records per order (can be multiple installment rows).
        columns:
          - name: order_id
            tests: [not_null]
          - name: payment_sequential
            tests: [not_null]
          - name: payment_type
            tests:
              - accepted_values:
                  values: ["credit_card", "boleto", "voucher", "debit_card", "not_defined"]
          - name: payment_installments
          - name: payment_value
            tests: [not_null]

      - name: order_reviews
        description: Customer review per order.
        columns:
          - name: review_id
            tests: [not_null]
          - name: order_id
            tests: [not_null]
          - name: review_score
            tests:
              - not_null
              - accepted_values:
                  values: [1, 2, 3, 4, 5]
          - name: review_comment_title
          - name: review_comment_message
          - name: review_creation_date
          - name: review_answer_timestamp

      - name: products
        description: Product catalogue with dimensions and category.
        columns:
          - name: product_id
            tests: [not_null, unique]
          - name: product_category_name
          - name: product_name_lenght
          - name: product_description_lenght
          - name: product_photos_qty
          - name: product_weight_g
          - name: product_length_cm
          - name: product_height_cm
          - name: product_width_cm

      - name: sellers
        description: Seller master data.
        columns:
          - name: seller_id
            tests: [not_null, unique]
          - name: seller_zip_code_prefix
          - name: seller_city
          - name: seller_state

      - name: product_category_name_translation
        description: Portuguese → English category name mapping.
        columns:
          - name: product_category_name
            tests: [not_null, unique]
          - name: product_category_name_english
            tests: [not_null]
